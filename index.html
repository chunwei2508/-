 <!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>股票买卖记录计算器</title>

<style>
:root{
  --bg:#f6f1e8;
  --card:#fffdf8;
  --cream:#fbf4e8;
  --line:#eadfce;
  --text:#1f1b17;
  --muted:#7b7166;
  --brown:#9b6a25;
  --brown-dark:#7d4e10;
  --green:#16824a;
  --red:#d82020;
  --shadow:0 10px 30px rgba(80,55,25,.08);
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans SC",sans-serif;
  background:linear-gradient(180deg,#fbf7ef,#f4ecdf);
  color:var(--text);
}

.app{
  max-width:1180px;
  margin:auto;
  padding:24px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  margin-bottom:24px;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo{
  width:54px;
  height:54px;
  border-radius:12px;
  background:linear-gradient(135deg,#c48a32,#7c4b0e);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:800;
}

h1{
  margin:0;
  font-size:30px;
  letter-spacing:.5px;
}

.subtitle{
  color:var(--muted);
  margin-top:6px;
  font-size:15px;
}

.settings-btn{
  border:1px solid var(--brown);
  background:#fffaf2;
  color:var(--brown-dark);
  border-radius:12px;
  padding:13px 18px;
  font-weight:700;
  cursor:pointer;
}

.main-grid{
  display:grid;
  grid-template-columns:1.5fr .8fr;
  gap:24px;
}

.card{
  background:rgba(255,253,248,.92);
  border:1px solid var(--line);
  border-radius:18px;
  padding:26px;
  box-shadow:var(--shadow);
}

.card h2{
  margin:0 0 22px;
  font-size:22px;
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px 26px;
}

.form-group label{
  display:block;
  font-weight:700;
  margin-bottom:8px;
  font-size:15px;
}

input,select{
  width:100%;
  border:1px solid #d8d0c3;
  background:white;
  border-radius:10px;
  padding:14px 15px;
  font-size:16px;
  outline:none;
}

input:focus,select:focus{
  border-color:var(--brown);
  box-shadow:0 0 0 3px rgba(155,106,37,.12);
}

.divider{
  height:1px;
  background:var(--line);
  margin:26px 0;
}

.actions{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  margin-top:24px;
}

button{
  border:0;
  border-radius:12px;
  padding:13px 22px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}

.primary{
  background:linear-gradient(135deg,#b77a24,#7d4e10);
  color:white;
}

.secondary{
  background:#f5e6cf;
  color:#7d4e10;
}

.outline{
  background:white;
  border:1px solid #8a8074;
  color:#2f2922;
}

.danger{
  background:white;
  color:var(--red);
  border:1px solid rgba(216,32,32,.55);
}

.preview-card{
  position:sticky;
  top:20px;
}

.preview-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:18px;
}

.preview-stock{
  font-size:25px;
  font-weight:900;
  letter-spacing:.5px;
}

.status-pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin-top:12px;
  padding:8px 14px;
  border-radius:13px;
  background:#f7ead4;
  color:#9a6418;
  font-weight:700;
}

.status-dot{
  width:9px;
  height:9px;
  border-radius:50%;
  background:#b47a23;
}

.status-dot.sold{
  background:var(--red);
}

.info-row{
  display:grid;
  grid-template-columns:42px 1fr auto;
  align-items:center;
  gap:14px;
  padding:18px 0;
  border-bottom:1px solid var(--line);
}

.icon{
  width:42px;
  height:42px;
  border-radius:10px;
  background:#f7ead4;
  color:#9a6418;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:21px;
}

.info-label{
  font-weight:700;
  font-size:16px;
}

.info-value{
  font-size:20px;
  font-weight:800;
  text-align:right;
}

.summary-box{
  margin-top:22px;
  background:linear-gradient(135deg,#fbf1df,#fffaf2);
  border-radius:16px;
  padding:20px;
  display:grid;
  grid-template-columns:42px 1fr auto;
  gap:14px;
  align-items:center;
}

.summary-title{
  font-size:17px;
  font-weight:800;
}

.summary-sub{
  color:var(--muted);
  margin-top:3px;
}

.summary-value{
  font-size:26px;
  font-weight:900;
}

.note{
  margin-top:18px;
  background:#fbf4e8;
  color:#8a7d70;
  padding:13px;
  border-radius:10px;
  font-size:14px;
}

.records-card{
  margin-top:26px;
}

.records-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
  margin-bottom:18px;
}

.records-tools{
  display:flex;
  gap:12px;
  align-items:center;
}

.filter{
  width:150px;
  padding:11px 12px;
  font-size:14px;
}

.table-wrap{
  overflow-x:auto;
  border:1px solid var(--line);
  border-radius:12px;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:980px;
  background:white;
}

th{
  background:#f7f0e6;
  font-size:14px;
  text-align:left;
  padding:16px;
  border-bottom:1px solid var(--line);
}

td{
  padding:18px 16px;
  border-bottom:1px solid var(--line);
  vertical-align:middle;
  font-size:15px;
}

tr:last-child td{
  border-bottom:none;
}

.stock-cell{
  font-size:22px;
  font-weight:900;
}

.record-status{
  margin-top:8px;
  font-size:14px;
  color:var(--muted);
  display:flex;
  align-items:center;
  gap:7px;
}

.small-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--green);
}

.small-dot.sold{
  background:var(--red);
}

.muted{
  color:var(--muted);
}

.record-input{
  padding:10px;
  font-size:14px;
  margin-bottom:8px;
  min-width:130px;
}

.mini-btn{
  padding:9px 12px;
  font-size:14px;
  border-radius:9px;
}

.profit{
  color:var(--green);
  font-weight:900;
}

.loss{
  color:var(--red);
  font-weight:900;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.28);
  z-index:10;
  padding:20px;
}

.modal.show{
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:#fffdf8;
  border-radius:18px;
  padding:24px;
  max-width:760px;
  width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.18);
}

.settings-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

.modal-actions{
  display:flex;
  justify-content:flex-end;
  gap:12px;
  margin-top:20px;
}

.footer-note{
  margin-top:18px;
  padding:18px;
  color:#7b7166;
  font-size:14px;
  background:rgba(255,253,248,.8);
  border:1px solid var(--line);
  border-radius:16px;
}

@media(max-width:900px){
  .main-grid{
    grid-template-columns:1fr;
  }
  .preview-card{
    position:static;
  }
  .header{
    align-items:flex-start;
    flex-direction:column;
  }
}

@media(max-width:650px){
  .app{
    padding:16px;
  }

  h1{
    font-size:24px;
  }

  .form-grid,
  .settings-grid{
    grid-template-columns:1fr;
  }

  .card{
    padding:20px;
  }

  .summary-box{
    grid-template-columns:38px 1fr;
  }

  .summary-value{
    grid-column:1 / -1;
    text-align:right;
  }

  .info-row{
    grid-template-columns:38px 1fr;
  }

  .info-value{
    grid-column:2;
    text-align:left;
  }
}
</style>
</head>

<body>
<div class="app">

  <div class="header">
    <div class="brand">
      <div class="logo">↗</div>
      <div>
        <h1>股票买卖记录计算器</h1>
        <div class="subtitle">记录你的交易，自动计算手续费、净收入、盈亏和持有天数</div>
      </div>
    </div>

    <button class="settings-btn" onclick="openSettings()">⚙ 手续费设置</button>
  </div>

  <div class="main-grid">

    <div class="card">
      <h2>新增买入记录</h2>

      <div class="form-grid">
        <div class="form-group">
          <label>股票代码 / 名称</label>
          <input id="stock" placeholder="例如：MAYBANK" oninput="livePreview()">
        </div>

        <div class="form-group">
          <label>买入价（RM）</label>
          <input id="buyPrice" type="number" step="0.001" placeholder="例如：10.440" oninput="livePreview()">
        </div>

        <div class="form-group">
          <label>买入日期</label>
          <input id="buyDate" type="date" onchange="livePreview()">
        </div>

        <div class="form-group">
          <label>状态</label>
          <select id="status" onchange="livePreview()">
            <option value="holding">还持有</option>
            <option value="sold">已卖出</option>
          </select>
        </div>

        <div class="form-group">
          <label>买入股数</label>
          <input id="qty" type="number" placeholder="例如：900" oninput="livePreview()">
        </div>

        <div class="form-group">
          <label>备注（选填）</label>
          <input id="remark" placeholder="例如：长期投资">
        </div>
      </div>

      <div class="divider"></div>

      <div class="form-grid">
        <div class="form-group">
          <label>卖出价（RM）（可空）</label>
          <input id="sellPrice" type="number" step="0.001" placeholder="例如：11.200" oninput="livePreview()">
        </div>

        <div class="form-group">
          <label>卖出日期（可空）</label>
          <input id="sellDate" type="date" onchange="livePreview()">
        </div>
      </div>

      <div class="actions">
        <button class="primary" onclick="calculate()">计算</button>
        <button class="secondary" onclick="saveRecord()">保存记录</button>
        <button class="outline" onclick="clearForm()">清空输入</button>
      </div>
    </div>

    <div class="card preview-card">
      <h2>实时计算结果</h2>

      <div class="preview-top">
        <div>
          <div class="muted">股票</div>
          <div class="preview-stock" id="pStock">-</div>
          <div class="status-pill">
            <span id="pStatusDot" class="status-dot"></span>
            <span id="pStatus">还持有</span>
          </div>
        </div>
      </div>

      <div class="info-row">
        <div class="icon">📅</div>
        <div class="info-label">日期</div>
        <div class="info-value" id="pDate">-</div>
      </div>

      <div class="info-row">
        <div class="icon">📊</div>
        <div class="info-label">股数</div>
        <div class="info-value" id="pQty">-</div>
      </div>

      <div class="info-row">
        <div class="icon">🏷</div>
        <div class="info-label">买入价（RM）</div>
        <div class="info-value" id="pBuyPrice">-</div>
      </div>

      <div class="info-row">
        <div class="icon">🧾</div>
        <div class="info-label">买入费用（RM）</div>
        <div class="info-value" id="pBuyFee">-</div>
      </div>

      <div class="summary-box">
        <div class="icon">💰</div>
        <div>
          <div class="summary-title" id="summaryTitle">总买入金额</div>
          <div class="summary-sub" id="summarySub">含费用</div>
        </div>
        <div class="summary-value" id="pTotalCost">RM 0.00</div>
      </div>

      <div class="note" id="pNote">* 卖出后将显示净收入与盈亏</div>
    </div>

  </div>

  <div class="card records-card">
    <div class="records-header">
      <h2>我的交易记录</h2>

      <div class="records-tools">
        <select class="filter" id="filterStatus" onchange="renderRecords()">
          <option value="all">全部状态</option>
          <option value="holding">还持有</option>
          <option value="sold">已卖出</option>
        </select>

        <button class="danger" onclick="clearAll()">🗑 删除全部</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>股票</th>
            <th>买入资料</th>
            <th>卖出资料</th>
            <th>持有天数</th>
            <th>实际成本（RM）</th>
            <th>净收入（RM）</th>
            <th>盈亏（RM）</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="records"></tbody>
      </table>
    </div>
  </div>

  <div class="footer-note">
    免责声明：本工具只供参考，手续费计算结果可能与券商实际收取费用略有差异，请以券商 contract note 为准。数据只保存在你的浏览器，不会上传到任何服务器。
  </div>

</div>

<div class="modal" id="settingsModal">
  <div class="modal-box">
    <h2>手续费设置</h2>

    <div class="settings-grid">
      <div class="form-group">
        <label>Brokerage %</label>
        <input id="brokerRate" type="number" step="0.001" value="0.08">
      </div>

      <div class="form-group">
        <label>最低 Brokerage RM</label>
        <input id="minBroker" type="number" step="0.01" value="8">
      </div>

      <div class="form-group">
        <label>SST %</label>
        <input id="sstRate" type="number" step="0.01" value="8">
      </div>

      <div class="form-group">
        <label>Clearing Fee %</label>
        <input id="clearRate" type="number" step="0.001" value="0.03">
      </div>

      <div class="form-group">
        <label>Clearing Fee 上限 RM</label>
        <input id="clearCap" type="number" step="0.01" value="1000">
      </div>

      <div class="form-group">
        <label>Stamp Duty 上限 RM</label>
        <input id="stampCap" type="number" step="1" value="1000">
      </div>
    </div>

    <div class="modal-actions">
      <button class="outline" onclick="closeSettings()">关闭</button>
      <button class="primary" onclick="saveSettings()">保存设置</button>
    </div>
  </div>
</div>

<script>
let records = JSON.parse(localStorage.getItem("stockRecords_v2") || "[]");

let settings = JSON.parse(localStorage.getItem("stockFeeSettings_v2") || JSON.stringify({
  brokerRate:0.08,
  minBroker:8,
  sstRate:8,
  clearRate:0.03,
  clearCap:1000,
  stampCap:1000
}));

document.getElementById("buyDate").valueAsDate = new Date();

loadSettings();
renderRecords();
livePreview();

function money(n){
  return "RM " + Number(n || 0).toLocaleString("en-MY", {
    minimumFractionDigits:2,
    maximumFractionDigits:2
  });
}

function numberOnly(n){
  return Number(n || 0).toLocaleString("en-MY", {
    minimumFractionDigits:2,
    maximumFractionDigits:2
  });
}

function price(n){
  if(!n) return "-";
  return Number(n).toFixed(3);
}

function todayText(){
  return new Date().toISOString().slice(0,10);
}

function daysBetween(start,end){
  if(!start) return 0;

  const s = new Date(start);
  const e = end ? new Date(end) : new Date();

  s.setHours(0,0,0,0);
  e.setHours(0,0,0,0);

  return Math.max(0, Math.floor((e - s) / 86400000));
}

function openSettings(){
  document.getElementById("settingsModal").classList.add("show");
}

function closeSettings(){
  document.getElementById("settingsModal").classList.remove("show");
}

function loadSettings(){
  document.getElementById("brokerRate").value = settings.brokerRate;
  document.getElementById("minBroker").value = settings.minBroker;
  document.getElementById("sstRate").value = settings.sstRate;
  document.getElementById("clearRate").value = settings.clearRate;
  document.getElementById("clearCap").value = settings.clearCap;
  document.getElementById("stampCap").value = settings.stampCap;
}

function saveSettings(){
  settings = {
    brokerRate:Number(document.getElementById("brokerRate").value || 0),
    minBroker:Number(document.getElementById("minBroker").value || 0),
    sstRate:Number(document.getElementById("sstRate").value || 0),
    clearRate:Number(document.getElementById("clearRate").value || 0),
    clearCap:Number(document.getElementById("clearCap").value || 0),
    stampCap:Number(document.getElementById("stampCap").value || 0)
  };

  localStorage.setItem("stockFeeSettings_v2", JSON.stringify(settings));
  closeSettings();
  livePreview();
  renderRecords();
}

function feeBreakdown(value){
  const brokerage = Math.max(value * settings.brokerRate / 100, settings.minBroker);
  const sst = brokerage * settings.sstRate / 100;
  const clearing = Math.min(value * settings.clearRate / 100, settings.clearCap);

  // 马股常见 Stamp Duty：每 RM1000 或不足 RM1000 算 RM1，上限可在设置更改
  const stamp = Math.min(Math.ceil(value / 1000), settings.stampCap);

  return {
    value,
    brokerage,
    sst,
    clearing,
    stamp,
    totalFee: brokerage + sst + clearing + stamp
  };
}

function getFormData(){
  return {
    id: Date.now(),
    stock: document.getElementById("stock").value.trim().toUpperCase(),
    buyDate: document.getElementById("buyDate").value,
    status: document.getElementById("status").value,
    qty:Number(document.getElementById("qty").value || 0),
    buyPrice:Number(document.getElementById("buyPrice").value || 0),
    sellPrice:Number(document.getElementById("sellPrice").value || 0),
    sellDate:document.getElementById("sellDate").value,
    remark:document.getElementById("remark").value.trim()
  };
}

function compute(data){
  const buyValue = data.qty * data.buyPrice;
  const buyFee = feeBreakdown(buyValue);
  const totalCost = buyValue + buyFee.totalFee;

  let sellValue = 0;
  let sellFee = null;
  let netSell = 0;
  let profit = null;

  if(data.sellPrice > 0){
    sellValue = data.qty * data.sellPrice;
    sellFee = feeBreakdown(sellValue);
    netSell = sellValue - sellFee.totalFee;
    profit = netSell - totalCost;
  }

  return {
    buyValue,
    buyFee,
    totalCost,
    sellValue,
    sellFee,
    netSell,
    profit,
    holdingDays:daysBetween(data.buyDate,data.sellDate)
  };
}

function livePreview(){
  const data = getFormData();
  const c = compute(data);

  const stock = data.stock || "-";
  const statusText = data.status === "sold" || data.sellPrice > 0 ? "已卖出" : "还持有";

  document.getElementById("pStock").textContent = stock;
  document.getElementById("pStatus").textContent = statusText;
  document.getElementById("pStatusDot").className = statusText === "已卖出" ? "status-dot sold" : "status-dot";

  document.getElementById("pDate").textContent = data.buyDate || "-";
  document.getElementById("pQty").textContent = data.qty ? data.qty.toLocaleString("en-MY") : "-";
  document.getElementById("pBuyPrice").textContent = data.buyPrice ? price(data.buyPrice) : "-";
  document.getElementById("pBuyFee").textContent = data.qty && data.buyPrice ? numberOnly(c.buyFee.totalFee) : "-";

  if(data.sellPrice > 0){
    document.getElementById("summaryTitle").textContent = "卖出净收入";
    document.getElementById("summarySub").textContent = "扣除卖出费用后";
    document.getElementById("pTotalCost").textContent = money(c.netSell);

    const profitClass = c.profit >= 0 ? "profit" : "loss";
    document.getElementById("pNote").innerHTML =
      `盈亏：<span class="${profitClass}">${money(c.profit)}</span> ｜ 持有 ${c.holdingDays} 天`;
  }else{
    document.getElementById("summaryTitle").textContent = "总买入金额";
    document.getElementById("summarySub").textContent = "含买入费用";
    document.getElementById("pTotalCost").textContent = money(c.totalCost);
    document.getElementById("pNote").textContent = "* 卖出后将显示净收入与盈亏";
  }
}

function calculate(){
  const data = getFormData();

  if(!data.stock || !data.buyDate || !data.qty || !data.buyPrice){
    alert("请填写股票、买入日期、买入股数和买入价");
    return null;
  }

  livePreview();
  return data;
}

function saveRecord(){
  const data = calculate();
  if(!data) return;

  if(data.sellPrice > 0){
    data.status = "sold";
    if(!data.sellDate){
      data.sellDate = todayText();
    }
  }else{
    data.status = "holding";
  }

  records.unshift(data);
  localStorage.setItem("stockRecords_v2", JSON.stringify(records));

  renderRecords();
  clearForm(false);
}

function clearForm(clearPreview=true){
  document.getElementById("stock").value = "";
  document.getElementById("buyPrice").value = "";
  document.getElementById("qty").value = "";
  document.getElementById("remark").value = "";
  document.getElementById("sellPrice").value = "";
  document.getElementById("sellDate").value = "";
  document.getElementById("status").value = "holding";
  document.getElementById("buyDate").valueAsDate = new Date();

  if(clearPreview){
    livePreview();
  }else{
    livePreview();
  }
}

function updateSell(id){
  const record = records.find(r => r.id === id);
  if(!record) return;

  const sellPrice = Number(document.getElementById("sellPrice_" + id).value || 0);
  const sellDate = document.getElementById("sellDate_" + id).value;

  if(!sellPrice || sellPrice <= 0){
    alert("请输入正确的卖出价");
    return;
  }

  record.sellPrice = sellPrice;
  record.sellDate = sellDate || todayText();
  record.status = "sold";

  localStorage.setItem("stockRecords_v2", JSON.stringify(records));
  renderRecords();
}

function undoSell(id){
  const record = records.find(r => r.id === id);
  if(!record) return;

  if(!confirm("确定要把这笔记录改回还持有吗？")){
    return;
  }

  record.sellPrice = 0;
  record.sellDate = "";
  record.status = "holding";

  localStorage.setItem("stockRecords_v2", JSON.stringify(records));
  renderRecords();
}

function deleteRecord(id){
  if(!confirm("确定删除这笔记录吗？")){
    return;
  }

  records = records.filter(r => r.id !== id);
  localStorage.setItem("stockRecords_v2", JSON.stringify(records));
  renderRecords();
}

function clearAll(){
  if(!confirm("确定删除全部记录吗？这个动作不能恢复。")){
    return;
  }

  records = [];
  localStorage.removeItem("stockRecords_v2");
  renderRecords();
}

function renderRecords(){
  const tbody = document.getElementById("records");
  const filter = document.getElementById("filterStatus").value;

  let list = [...records];

  if(filter !== "all"){
    list = list.filter(r => r.status === filter);
  }

  list.sort((a,b)=>{
    if(a.status !== b.status){
      return a.status === "holding" ? -1 : 1;
    }
    return daysBetween(b.buyDate,b.sellDate) - daysBetween(a.buyDate,a.sellDate);
  });

  if(list.length === 0){
    tbody.innerHTML = `
      <tr>
        <td colspan="8" style="text-align:center;color:#7b7166;padding:34px">
          暂时还没有记录
        </td>
      </tr>
    `;
    return;
  }

  tbody.innerHTML = list.map(r=>{
    const c = compute(r);
    const isSold = r.status === "sold" && r.sellPrice > 0;
    const profitClass = c.profit === null ? "" : c.profit >= 0 ? "profit" : "loss";

    return `
      <tr>
        <td>
          <div class="stock-cell">${r.stock}</div>
          <div class="record-status">
            <span class="small-dot ${isSold ? "sold" : ""}"></span>
            ${isSold ? "已卖出" : "还持有"}
          </div>
          ${r.remark ? `<div class="muted" style="margin-top:8px">${r.remark}</div>` : ""}
        </td>

        <td>
          ${r.buyDate}<br>
          ${Number(r.qty).toLocaleString("en-MY")} 股<br>
          RM ${price(r.buyPrice)}<br>
          <span class="muted">买入费用：${money(c.buyFee.totalFee)}</span>
        </td>

        <td>
          ${isSold ? `
            ${r.sellDate}<br>
            RM ${price(r.sellPrice)}<br>
            <span class="muted">卖出费用：${money(c.sellFee.totalFee)}</span><br><br>
          ` : `
            <span class="muted">还没有卖出</span><br><br>
          `}

          <input
            class="record-input"
            id="sellPrice_${r.id}"
            type="number"
            step="0.001"
            placeholder="添加卖出价"
            value="${r.sellPrice || ""}"
          >

          <input
            class="record-input"
            id="sellDate_${r.id}"
            type="date"
            value="${r.sellDate || ""}"
          >

          <br>

          <button class="mini-btn secondary" onclick="updateSell(${r.id})">更新卖出</button>
          ${isSold ? `<button class="mini-btn outline" onclick="undoSell(${r.id})">改回持有</button>` : ""}
        </td>

        <td>
          ${c.holdingDays} 天
          ${!isSold ? `<br><span class="muted">至今</span>` : ""}
        </td>

        <td>${numberOnly(c.totalCost)}</td>

        <td>
          ${isSold ? `<span class="profit">${numberOnly(c.netSell)}</span>` : "—"}
        </td>

        <td>
          ${isSold ? `<span class="${profitClass}">${c.profit >= 0 ? "+" : ""}${numberOnly(c.profit)}</span>` : "—"}
        </td>

        <td>
          <button class="mini-btn danger" onclick="deleteRecord(${r.id})">删除</button>
        </td>
      </tr>
    `;
  }).join("");
}
</script>

</body>
</html>
