<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>股票投资 Dashboard</title>
<style>
body{margin:0;background:#f6f1e8;color:#2f281f;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial}
.app{max-width:1050px;margin:auto;padding:18px}
h1{font-size:26px;margin:8px 0 4px}.sub{color:#776b5e;font-size:14px;margin-bottom:16px}
.stats,.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.grid{grid-template-columns:1.3fr .9fr}
.card,.stat,.record{background:#fffaf3;border-radius:20px;padding:18px;margin-bottom:14px;box-shadow:0 6px 20px #0001}
.stat{background:#eadcc8}.stat small{color:#6e6258}.stat b{display:block;font-size:24px;margin-top:6px}
input,select{width:100%;box-sizing:border-box;padding:12px;border:1px solid #d8c7ad;border-radius:12px;font-size:15px;margin:6px 0 12px;background:white}
label{font-weight:700;font-size:14px}
.form{display:grid;grid-template-columns:1fr 1fr;gap:12px}
button{border:0;border-radius:12px;padding:11px 15px;font-weight:800}
.primary{background:#9b6b2e;color:white}.secondary{background:#eadcc8;color:#5a3d1d}.danger{background:white;color:#d11;border:1px solid #e55}
.row{display:grid;grid-template-columns:42px 1fr auto;gap:12px;align-items:center;border-bottom:1px solid #eadfce;padding:13px 0}
.icon{background:#f0e3d1;color:#8a5c22;border-radius:12px;width:42px;height:42px;display:flex;align-items:center;justify-content:center}
.row small{color:#776b5e}.row b{font-size:18px}.pill{background:#f0e3d1;border-radius:99px;padding:7px 11px;color:#8a5c22;font-weight:800}
.box{background:#f0e3d1;border-radius:16px;padding:15px;margin-top:14px}.box b{font-size:22px}
.records-head{display:flex;justify-content:space-between;gap:10px;align-items:center}
.stock{font-size:22px;font-weight:900}.green{color:#118042;font-weight:900}.red{color:#c62828;font-weight:900}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.info{background:#fff7ec;border-radius:14px;padding:12px}.info small{color:#776b5e}
.sell{display:grid;grid-template-columns:1fr 1fr auto auto;gap:10px;align-items:end;border-top:1px solid #eadfce;margin-top:12px;padding-top:12px}
.top-actions{display:flex;gap:10px;flex-wrap:wrap}
@media(max-width:800px){.stats,.grid,.form,.info-grid,.sell{grid-template-columns:1fr}.app{padding:14px}h1{font-size:24px}}
</style>
</head>
<body>
<div class="app">
<h1>📈 股票投资 Dashboard</h1>
<div class="sub">记录买卖、手续费、净收入、盈亏和持有天数</div>

<div class="stats">
<div class="stat"><small>总投资金额</small><b id="sInvest">RM 0.00</b></div>
<div class="stat"><small>持仓股票</small><b id="sHold">0 只</b></div>
<div class="stat"><small>已实现盈亏</small><b id="sProfit">RM 0.00</b></div>
</div>

<div class="grid">
<div class="card">
<h2>新增买入记录</h2>
<div class="form">
<div><label>股票代码/名称</label><input id="stock" placeholder="MAYBANK" oninput="preview()"></div>
<div><label>买入价 RM</label><input id="buyPrice" type="number" step="0.001" placeholder="10.440" oninput="preview()"></div>
<div><label>买入日期</label><input id="buyDate" type="date" onchange="preview()"></div>
<div><label>买入股数</label><input id="qty" type="number" placeholder="900" oninput="preview()"></div>
<div><label>卖出价 RM（可空）</label><input id="sellPrice" type="number" step="0.001" oninput="preview()"></div>
<div><label>卖出日期（可空）</label><input id="sellDate" type="date" onchange="preview()"></div>
</div>
<div class="top-actions">
<button class="primary" onclick="saveRecord()">保存记录</button>
<button class="secondary" onclick="clearForm()">清空</button>
</div>
</div>

<div class="card">
<h2>实时计算</h2>
<div id="preview"></div>
</div>
</div>

<div class="card">
<div class="records-head">
<h2>我的交易记录</h2>
<div class="top-actions">
<button class="secondary" onclick="resetOldData()">清除缓存</button>
<button class="danger" onclick="clearAll()">删除全部</button>
</div>
</div>
<div id="records"></div>
</div>
</div>

<script>
const KEY="stockDashboardFinalV1";
let records=JSON.parse(localStorage.getItem(KEY)||"[]");

document.getElementById("buyDate").valueAsDate=new Date();

function money(n){
  return "RM "+Number(n||0).toLocaleString("en-MY",{minimumFractionDigits:2,maximumFractionDigits:2});
}
function holdDays(a,b){
  if(!a)return 0;
  let s=new Date(a),e=b?new Date(b):new Date();
  s.setHours(0,0,0,0);e.setHours(0,0,0,0);
  return Math.max(0,Math.floor((e-s)/86400000));
}
function fee(v){
  let brokerage=Math.max(v*0.0008,8);
  let clearing=v*0.0003;
  let stamp=Math.ceil(v/1000);
  let sst=brokerage*0.08;
  return brokerage+clearing+stamp+sst;
}
function formData(){
  return{
    id:Date.now()+Math.floor(Math.random()*999),
    stock:document.getElementById("stock").value.trim().toUpperCase(),
    buyDate:document.getElementById("buyDate").value,
    qty:Number(document.getElementById("qty").value),
    buyPrice:Number(document.getElementById("buyPrice").value),
    sellPrice:Number(document.getElementById("sellPrice").value),
    sellDate:document.getElementById("sellDate").value
  };
}
function calc(r){
  let buyValue=r.qty*r.buyPrice;
  let buyFee=fee(buyValue);
  let cost=buyValue+buyFee;
  let sellFee=0,income=0,profit=null,roi=null;
  if(r.sellPrice>0){
    let sellValue=r.qty*r.sellPrice;
    sellFee=fee(sellValue);
    income=sellValue-sellFee;
    profit=income-cost;
    roi=cost>0?profit/cost*100:0;
  }
  return{buyValue,buyFee,cost,sellFee,income,profit,roi,days:holdDays(r.buyDate,r.sellDate)};
}
function preview(){
  let r=formData(),c=calc(r),name=r.stock||"MAYBANK";
  document.getElementById("preview").innerHTML=`
  <div class="row"><div class="icon">💼</div><div><small>股票</small><br><b>${name}</b></div><div class="pill">${r.sellPrice>0?"已卖出":"还持有"}</div></div>
  <div class="row"><div class="icon">📅</div><div><small>日期</small><br><b>${r.buyDate||"-"}</b></div><div></div></div>
  <div class="row"><div class="icon">📊</div><div><small>股数</small><br><b>${r.qty||0}</b></div><div></div></div>
  <div class="row"><div class="icon">🏷️</div><div><small>买入价</small><br><b>RM ${(r.buyPrice||0).toFixed(3)}</b></div><div></div></div>
  <div class="row"><div class="icon">🧾</div><div><small>买入费用</small><br><b>${money(c.buyFee)}</b></div><div></div></div>
  <div class="box"><small>总买入金额（含费用）</small><br><b>${money(c.cost)}</b></div>
  ${r.sellPrice>0?`<div class="box"><small>卖出净收入</small><br><b>${money(c.income)}</b><br><small>盈亏</small><br><b class="${c.profit>=0?'green':'red'}">${money(c.profit)} (${c.roi.toFixed(2)}%)</b></div>`:""}`;
}
function saveRecord(){
  let r=formData();
  if(!r.stock||!r.buyDate||!r.qty||!r.buyPrice){alert("请填写股票、日期、股数和买入价");return;}
  if(r.sellPrice>0&&!r.sellDate)r.sellDate=new Date().toISOString().slice(0,10);
  records.unshift(r);
  save();
  clearForm();
}
function save(){
  localStorage.setItem(KEY,JSON.stringify(records));
  render();
}
function clearForm(){
  document.getElementById("stock").value="";
  document.getElementById("qty").value="";
  document.getElementById("buyPrice").value="";
  document.getElementById("sellPrice").value="";
  document.getElementById("sellDate").value="";
  document.getElementById("buyDate").valueAsDate=new Date();
  preview();
}
function updateSell(id){
  let r=records.find(x=>String(x.id)===String(id));
  if(!r)return;
  let p=Number(document.getElementById("sp"+id).value);
  let d=document.getElementById("sd"+id).value;
  if(!p||p<=0){alert("请输入卖出价");return;}
  r.sellPrice=p;
  r.sellDate=d||new Date().toISOString().slice(0,10);
  save();
}
function undoSell(id){
  let r=records.find(x=>String(x.id)===String(id));
  if(!r)return;
  r.sellPrice=0;
  r.sellDate="";
  save();
}
function del(id){
  records=records.filter(x=>String(x.id)!==String(id));
  save();
}
function clearAll(){
  records=[];
  localStorage.setItem(KEY,"[]");
  render();
  preview();
}
function resetOldData(){
  localStorage.removeItem("stockRecordsV3");
  localStorage.removeItem("stockDashboardRecords");
  localStorage.removeItem("stockData");
  localStorage.removeItem("stockRecords");
  records=[];
  localStorage.setItem(KEY,"[]");
  render();
  preview();
  alert("缓存已清除");
}
function render(){
  let invest=0,hold=0,real=0;
  records.forEach(r=>{
    let c=calc(r);
    invest+=c.cost;
    if(r.sellPrice>0)real+=c.profit;else hold++;
  });
  document.getElementById("sInvest").innerHTML=money(invest);
  document.getElementById("sHold").innerHTML=hold+" 只";
  let sp=document.getElementById("sProfit");
  sp.innerHTML=money(real);
  sp.className=real>=0?"green":"red";

  let box=document.getElementById("records");
  if(records.length===0){box.innerHTML="<p>还没有交易记录</p>";return;}

  box.innerHTML=records.map(r=>{
    let c=calc(r),sold=r.sellPrice>0;
    return `<div class="record">
      <div class="records-head">
        <div><div class="stock">${r.stock}</div><div class="${sold?'red':'green'}">${sold?'● 已卖出':'● 还持有'}</div></div>
        <button class="danger" onclick="del('${r.id}')">删除</button>
      </div>
      <div class="info-grid">
        <div class="info"><small>买入资料</small><br><b>${r.buyDate}</b><br>${r.qty} 股<br>RM ${r.buyPrice.toFixed(3)}</div>
        <div class="info"><small>持有天数</small><br><b>${c.days} 天</b></div>
        <div class="info"><small>实际成本</small><br><b>${money(c.cost)}</b></div>
        <div class="info"><small>买入费用</small><br><b>${money(c.buyFee)}</b></div>
        <div class="info"><small>净收入</small><br><b>${sold?money(c.income):"-"}</b></div>
        <div class="info"><small>盈亏</small><br><b class="${sold?(c.profit>=0?'green':'red'):''}">${sold?money(c.profit)+" ("+c.roi.toFixed(2)+"%)":"-"}</b></div>
      </div>
      <div class="sell">
        <div><label>卖出价 RM</label><input id="sp${r.id}" type="number" step="0.001" value="${r.sellPrice||""}"></div>
        <div><label>卖出日期</label><input id="sd${r.id}" type="date" value="${r.sellDate||""}"></div>
        <button class="primary" onclick="updateSell('${r.id}')">更新卖出</button>
        <button class="secondary" onclick="undoSell('${r.id}')">改回持有</button>
      </div>
    </div>`;
  }).join("");
}
preview();
render();
</script>
</body>
</html>
